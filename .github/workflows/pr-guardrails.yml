name: PR guardrails

# Garde-fous anti méga-PR (voir CLAUDE.md › « Règles PR & agents »).
# 1. Aucune PR ne doit contenir de marqueur de conflit Git non résolu.
# 2. Les features ciblent `dev`. Seule une PR `dev → main` est autorisée vers `main`
#    (release). Toute autre PR vers `main` est bloquée.
# 3. Tests obligatoires en CI : compile Python (api.py + src/) et build frontend.
#    But : le « vert » ne dépend plus de la bonne foi de l'agent qui ouvre la PR —
#    une PR ne peut être mergée que si la machine a compilé et buildé.

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: read

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Base branch must be dev (sauf release dev → main)
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "PR: $HEAD_REF → $BASE_REF"
          if [ "$BASE_REF" = "main" ] && [ "$HEAD_REF" != "dev" ]; then
            echo "::error::Les PR vers 'main' ne sont autorisées que depuis 'dev' (release). Pour une feature, cible 'dev'."
            exit 1
          fi
          if [ "$BASE_REF" != "dev" ] && [ "$BASE_REF" != "main" ]; then
            echo "::error::Base inattendue '$BASE_REF'. Une feature doit cibler 'dev'."
            exit 1
          fi
          echo "Base OK."

      - name: No unresolved conflict markers
        run: |
          # Marqueurs de conflit Git stricts : '<<<<<<< ', '=======' (ligne seule), '>>>>>>> '.
          # On exclut ce dossier de workflows (qui mentionne les marqueurs en texte).
          if git grep -nE '^(<<<<<<< |>>>>>>> |=======$)' -- . ':(exclude).github/workflows/' ; then
            echo "::error::Marqueur(s) de conflit détecté(s) ci-dessus. Résous le merge avant de merger."
            exit 1
          fi
          echo "Aucun marqueur de conflit."

      - name: Python compile (api.py + src/)
        run: |
          python3 -m py_compile api.py src/*.py
          echo "py_compile OK."

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      # Les tests n'appellent aucun réseau, mais ils importent les modules du projet,
      # qui importent eux-mêmes anthropic/supabase/… au chargement. Sans ces paquets,
      # les tests ne peuvent même pas être IMPORTÉS.
      - name: Install Python deps
        run: pip install -r requirements.txt

      # Tests unitaires (stdlib, aucun réseau, aucun secret).
      # Couvrent notamment le CLOISONNEMENT MULTI-CLIENT du moteur d'envoi (ALE-174) :
      # le cron tourne en service-role, donc sans le cloisonnement automatique de la
      # base — c'est ce test, et pas la vigilance humaine, qui garantit qu'une action
      # du client A ne partira jamais depuis le compte LinkedIn du client B.
      - name: Tests unitaires
        run: |
          python3 -m unittest discover -s tests -t . -v
          echo "tests OK."

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build
